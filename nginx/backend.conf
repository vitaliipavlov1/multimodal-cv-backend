server {
    listen 443 ssl;
    server_name api.vitaliipavlov.site;

    ssl_certificate     /etc/letsencrypt/live/api.vitaliipavlov.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.vitaliipavlov.site/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # WebSocket — long-lived connections for inference streaming
    location /ws/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # No timeout — inference sessions run indefinitely
        proxy_read_timeout    0;
        proxy_send_timeout    0;
        proxy_connect_timeout 10s;
    }

    # HTTP REST (health, metrics)
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
}
